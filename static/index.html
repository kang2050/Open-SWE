<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open SWE - AI Coding Agent</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131d;
    --surface2: #1c1c2e;
    --border: #2a2a3e;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e0e0e8;
    --text2: #8888a0;
    --user-bg: #1a1a3a;
    --ai-bg: #0f1f1a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, 'SF Pro', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header h1 { font-size: 1.1rem; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .header .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.8rem; color: var(--text2);
  }
  .header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Config Bar */
  .config-bar {
    display: flex; gap: 10px; padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap; align-items: center;
    flex-shrink: 0;
  }
  .config-bar label { font-size: 0.78rem; color: var(--text2); }
  .config-bar input, .config-bar select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; color: var(--text);
    font-size: 0.82rem; outline: none;
  }
  .config-bar input:focus { border-color: var(--accent); }
  .config-bar .sep { width: 1px; height: 24px; background: var(--border); }

  /* Chat Area */
  .chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg {
    max-width: 85%; padding: 14px 18px;
    border-radius: 14px; font-size: 0.92rem;
    line-height: 1.6; white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid rgba(108,99,255,0.2);
    border-bottom-right-radius: 4px;
  }
  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bg);
    border: 1px solid rgba(0,212,170,0.15);
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 0.8rem; color: var(--text2);
    border-radius: 8px; padding: 8px 14px;
  }
  .msg .role {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
    opacity: 0.6;
  }
  .msg.ai .role { color: var(--accent2); }
  .msg.user .role { color: var(--accent); }

  .msg code {
    background: rgba(0,0,0,0.3);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85em;
  }
  .msg pre {
    background: rgba(0,0,0,0.4);
    padding: 10px 14px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    line-height: 1.5;
  }

  .typing { display: flex; gap: 4px; padding: 6px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2); opacity: 0.3;
    animation: blink 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

  /* Input Area */
  .input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px;
    max-width: 900px; margin: 0 auto;
  }
  .input-row textarea {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    color: var(--text); font-size: 0.92rem;
    font-family: inherit;
    resize: none; outline: none;
    min-height: 48px; max-height: 200px;
    line-height: 1.5;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text2); }
  .send-btn {
    width: 48px; height: 48px;
    border-radius: 12px; border: none;
    background: var(--accent); color: #fff;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
    align-self: flex-end;
  }
  .send-btn:hover { background: #7b73ff; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer {
    text-align: center; padding: 8px;
    font-size: 0.7rem; color: var(--text2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .footer a { color: var(--accent); text-decoration: none; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .config-bar { padding: 8px 12px; }
    .chat { padding: 12px; }
    .input-area { padding: 10px 12px; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Open SWE</span> AI Coding Agent</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</div>

<div class="config-bar">
  <label>Repo Owner</label>
  <input id="repoOwner" value="kang2050" style="width:120px">
  <label>Repo Name</label>
  <input id="repoName" placeholder="e.g. Open-SWE" style="width:160px">
  <div class="sep"></div>
  <label>Thread</label>
  <select id="threadSelect" style="min-width:140px">
    <option value="">New Thread</option>
  </select>
  <button onclick="createThread()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:0.8rem;">+ New</button>
</div>

<div class="chat" id="chat">
  <div class="msg system">
    Welcome! Configure the repo above, then send a coding task to the AI agent.
    <br>The agent can read code, write code, run tests, and open pull requests.
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" placeholder="Describe a coding task... (Shift+Enter for newline)" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#x27A4;</button>
  </div>
</div>

<div class="footer">
  Powered by <a href="https://github.com/langchain-ai/open-swe" target="_blank">Open SWE</a> &middot;
  LangGraph + Claude Sonnet 4.6 via Poe
</div>

<script>
const API = window.location.origin;
let currentThreadId = null;
let isRunning = false;

// Auto-resize textarea
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + 'px';
});

// Check health
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    if (d.status === 'healthy') {
      document.getElementById('statusDot').style.background = '#00d4aa';
      document.getElementById('statusText').textContent = 'Online';
    }
  } catch {
    document.getElementById('statusDot').style.background = '#ff6b6b';
    document.getElementById('statusText').textContent = 'Offline';
  }
}

// Create thread
async function createThread() {
  const r = await fetch(`${API}/threads`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
  });
  const d = await r.json();
  currentThreadId = d.thread_id;

  const sel = document.getElementById('threadSelect');
  const opt = document.createElement('option');
  opt.value = d.thread_id;
  opt.textContent = d.thread_id.slice(0, 8) + '...';
  sel.appendChild(opt);
  sel.value = d.thread_id;

  addMsg('system', `Thread created: ${d.thread_id.slice(0,8)}...`);
  return d.thread_id;
}

document.getElementById('threadSelect').addEventListener('change', (e) => {
  currentThreadId = e.target.value || null;
});

// Add message to chat
function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role !== 'system') {
    const roleLabel = document.createElement('div');
    roleLabel.className = 'role';
    roleLabel.textContent = role === 'user' ? 'You' : 'Agent';
    div.appendChild(roleLabel);
  }

  const content = document.createElement('div');
  content.innerHTML = formatText(text);
  div.appendChild(content);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// Add streaming message
function addStreamMsg() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'streaming';

  const roleLabel = document.createElement('div');
  roleLabel.className = 'role';
  roleLabel.textContent = 'Agent';
  div.appendChild(roleLabel);

  const content = document.createElement('div');
  content.id = 'streamContent';
  content.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  div.appendChild(content);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return content;
}

function formatText(text) {
  // Simple markdown: code blocks, inline code, bold
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// Send message
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isRunning) return;

  const repoOwner = document.getElementById('repoOwner').value.trim();
  const repoName = document.getElementById('repoName').value.trim();

  if (!repoName) {
    addMsg('system', 'Please enter a repo name above first.');
    return;
  }

  // Create thread if none
  if (!currentThreadId) {
    await createThread();
  }

  addMsg('user', text);
  input.value = '';
  input.style.height = 'auto';

  isRunning = true;
  document.getElementById('sendBtn').disabled = true;

  const streamEl = addStreamMsg();
  let fullText = '';
  let toolCalls = [];

  try {
    const response = await fetch(`${API}/threads/${currentThreadId}/runs/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        assistant_id: 'agent',
        input: { messages: [{ role: 'user', content: text }] },
        config: { configurable: { repo: { owner: repoOwner, name: repoName } } },
        stream_mode: ['events']
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));

            // Chat model stream chunks
            if (data.event === 'on_chat_model_stream') {
              const chunk = data.data?.chunk;
              if (chunk?.content) {
                fullText += chunk.content;
                streamEl.innerHTML = formatText(fullText);
                document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
              }
              // Tool calls
              if (chunk?.tool_call_chunks?.length) {
                for (const tc of chunk.tool_call_chunks) {
                  if (tc.name) toolCalls.push(tc.name);
                }
              }
            }

            // Tool execution
            if (data.event === 'on_tool_start') {
              const toolName = data.name || 'tool';
              if (fullText) fullText += '\n';
              fullText += `🔧 Running: ${toolName}...\n`;
              streamEl.innerHTML = formatText(fullText);
            }
            if (data.event === 'on_tool_end') {
              const toolName = data.name || 'tool';
              fullText += `✓ ${toolName} done\n`;
              streamEl.innerHTML = formatText(fullText);
            }

            // Error
            if (data.event === 'error' || data.error) {
              fullText += `\n❌ Error: ${data.message || data.error || 'Unknown error'}`;
              streamEl.innerHTML = formatText(fullText);
            }
          } catch {}
        }

        if (line.startsWith('event: error')) {
          // Next data line has the error
        }
      }
    }

    if (!fullText) {
      streamEl.innerHTML = '<em style="color:var(--text2)">No response received.</em>';
    }
  } catch (err) {
    streamEl.innerHTML = `<span style="color:#ff6b6b">Error: ${err.message}</span>`;
  }

  document.getElementById('streaming')?.removeAttribute('id');
  document.getElementById('streamContent')?.removeAttribute('id');
  isRunning = false;
  document.getElementById('sendBtn').disabled = false;
  msgInput.focus();
}

// Init
checkHealth();
setInterval(checkHealth, 30000);
</script>

</body>
</html>
